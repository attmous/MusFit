name: PR emulator evidence

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited, deleted]
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number to reevaluate
        required: true
        type: number

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

concurrency:
  group: pr-emulator-evidence-${{ github.event.pull_request.number || github.event.issue.number || inputs.pull_request }}
  cancel-in-progress: true

jobs:
  evaluate:
    if: >-
      (github.event_name == 'pull_request_target' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.pull_request != null) &&
      (github.event_name != 'issue_comment' ||
      github.event.comment.user.login == github.repository_owner)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted default-branch checker
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Evaluate exact-head emulator evidence
        shell: pwsh
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || inputs.pull_request }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          ./scripts/dev/check-pr-emulator-evidence.ps1
          -Repository $env:REPOSITORY
          -PullRequest ([int] $env:PR_NUMBER)
          -Token $env:GH_TOKEN
          -SetCommitStatus
