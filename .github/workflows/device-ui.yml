name: Android device and UI

on:
  push:
    branches: [ "master", "main" ]
  schedule:
    - cron: "41 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: device-ui-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle build cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          develocity-injection-enabled: false
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Enable KVM for managed devices
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Provision managed-device system images
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "system-images;android-28;google_apis;x86_64" \
            "system-images;android-37.0;google_apis_ps16k;x86_64"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run API 28 and API 37 migration matrix
        run: ./gradlew migrationApi28And37GroupInternalDebugAndroidTest '-Pandroid.experimental.testOptions.managedDevices.maxConcurrentDevices=1' --no-daemon --console=plain

      - name: Retain migration reports and device diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-migration-matrix-${{ github.run_attempt }}
          path: |
            app/build/reports/androidTests/managedDevice/
            app/build/outputs/androidTest-results/managedDevice/
            app/build/outputs/managed_device_android_test_additional_output/
          if-no-files-found: warn
          retention-days: 30

  critical-journeys:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle build cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          develocity-injection-enabled: false
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Enable KVM for managed devices
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Provision managed-device system images
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "system-images;android-28;google_apis;x86_64" \
            "system-images;android-37.0;google_apis_ps16k;x86_64"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run API 28 and API 37 critical journeys
        run: ./gradlew criticalJourneysApi28And37GroupInternalDebugAndroidTest '-Pandroid.experimental.testOptions.managedDevices.maxConcurrentDevices=1' '-Pandroid.testInstrumentationRunnerArguments.class=com.musfit.ui.MusFitCriticalJourneyInstrumentationTest' --no-daemon --console=plain

      - name: Retain managed-device results and failure diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-critical-journeys-${{ github.run_attempt }}
          path: |
            app/build/reports/androidTests/managedDevice/
            app/build/outputs/androidTest-results/managedDevice/
            app/build/outputs/managed_device_android_test_additional_output/
          if-no-files-found: warn
          retention-days: 14

  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout reviewed screenshot references
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle build cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          develocity-injection-enabled: false
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify screenshot and accessibility references
        run: ./gradlew verifyRoborazziInternalDebug --no-daemon --console=plain

      - name: Retain deterministic screenshot diffs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-screenshot-regression-${{ github.run_attempt }}
          path: |
            app/build/reports/roborazzi/internalDebug/
            app/build/outputs/roborazzi-comparison/
            app/build/test-results/roborazzi/
            app/build/test-results/testInternalDebugUnitTest/
          if-no-files-found: warn
          retention-days: 14
