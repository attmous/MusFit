name: Android

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the app's versionCode (git commit count) is real.
          # A shallow checkout would collapse it to 1 and break OTA updates.
          fetch-depth: 0

      - name: Verify repository workflow contract
        shell: pwsh
        run: ./scripts/dev/test-dev-workflow.ps1 -SelfTest

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify debug build
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleDebugAndroidTest --no-daemon --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: musfit-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  # Publish each master build as a GitHub Release so Obtainium on the phone can
  # discover it. Reuses the APK the verify job already built. See docs/ops/auto-update.md.
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build number
        run: echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: musfit-debug-apk
          path: dist

      - name: Name the APK for humans
        run: mv dist/app-debug.apk "dist/musfit-${BUILD_NUMBER}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: MusFit build ${{ env.BUILD_NUMBER }}
          body: |
            Automated MusFit build (versionCode ${{ env.BUILD_NUMBER }}) from ${{ github.sha }}.
            Discoverable through Obtainium; Android normally requires install confirmation.
            See docs/ops/auto-update.md.
          files: dist/musfit-${{ env.BUILD_NUMBER }}.apk
          make_latest: true
