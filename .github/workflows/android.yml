name: Android

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the app's versionCode (git commit count) is real.
          # A shallow checkout would collapse it to 1 and break OTA updates.
          fetch-depth: 0

      - name: Verify repository workflow contract
        shell: pwsh
        run: ./scripts/dev/test-dev-workflow.ps1 -SelfTest

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify internal and production-shaped builds
        run: ./gradlew verifyReleaseVariantMatrix testInternalDebugUnitTest testProductionReleaseUnitTest lintInternalDebug lintProductionRelease assembleInternalDebug assembleInternalDebugAndroidTest assembleProductionRelease bundleProductionRelease --no-daemon --console=plain

      - name: Retain internal verification APK
        uses: actions/upload-artifact@v4
        with:
          name: musfit-internal-debug-apk
          path: app/build/outputs/apk/internal/debug/app-internal-debug.apk
          if-no-files-found: error
          retention-days: 7
