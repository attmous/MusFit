name: Android

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify debug build
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --no-daemon --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: musfit-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release-build:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build all variants
        run: ./gradlew build --no-daemon --console=plain
