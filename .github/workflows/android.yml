name: Android

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # setup-gradle build-result capture injects action-owned plugin dependencies.
  GRADLE_ACTIONS_SKIP_BUILD_RESULT_CAPTURE: "true"
  # Concurrent D8 instrumentation merges can exhaust the 4 GiB developer heap.
  GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx8g -Dfile.encoding=UTF-8"'

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the app's versionCode (git commit count) is real.
          # A shallow checkout would collapse it to 1 and break OTA updates.
          fetch-depth: 0

      - name: Verify repository workflow contract
        shell: pwsh
        run: ./scripts/dev/test-dev-workflow.ps1 -SelfTest

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle build and configuration cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Keep strict verification scoped to MusFit's declared build inputs.
          # setup-gradle's optional Develocity plugin has its own rotating graph.
          develocity-injection-enabled: false
          # Only master runs write cache entries; PR/branch runs read them.
          # Branches can read the default-branch cache, so same-commit re-runs
          # and non-source PRs reuse master's task outputs while the repo stays
          # under GitHub's 10 GB Actions cache cap.
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify configuration cache reuse and fail-closed versioning
        shell: pwsh
        run: ./scripts/dev/test-configuration-cache.ps1 -SelfTest

      - name: Verify internal, migration bridge, and production-shaped builds
        run: ./gradlew spotlessCheck detekt verifyCoreModules verifyReleaseVariantMatrix testInternalDebugUnitTest testLegacyMigrationReleaseUnitTest testProductionReleaseUnitTest lintInternalDebug lintLegacyMigrationRelease lintProductionRelease assembleInternalDebug assembleInternalDebugAndroidTest assembleLegacyMigrationRelease assembleProductionRelease bundleProductionRelease --no-daemon --console=plain

      - name: Generate and enforce actionable unit coverage
        timeout-minutes: 10
        shell: pwsh
        env:
          COVERAGE_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          ./gradlew :app:createInternalDebugUnitTestCoverageReport :core:model:jacocoTestReport :core:network:createInternalDebugUnitTestCoverageReport :core:data:createInternalDebugUnitTestCoverageReport :integration:healthconnect:createInternalDebugUnitTestCoverageReport :integration:scanner:createInternalDebugUnitTestCoverageReport :feature:food:createInternalDebugUnitTestCoverageReport :feature:training:createInternalDebugUnitTestCoverageReport :feature:profile:createInternalDebugUnitTestCoverageReport :feature:today:createInternalDebugUnitTestCoverageReport --no-daemon --console=plain
          $baseRef = $env:COVERAGE_BASE_REF
          if ([string]::IsNullOrWhiteSpace($baseRef) -or $baseRef -match '^0+$') {
            $baseRef = 'HEAD^'
          }
          $reports = @(
            'app/build/reports/coverage/test/internal/debug/report.xml'
            'core/model/build/reports/jacoco/test/jacocoTestReport.xml'
            'core/network/build/reports/coverage/test/internal/debug/report.xml'
            'core/data/build/reports/coverage/test/internal/debug/report.xml'
            'integration/healthconnect/build/reports/coverage/test/internal/debug/report.xml'
            'integration/scanner/build/reports/coverage/test/internal/debug/report.xml'
            'feature/food/build/reports/coverage/test/internal/debug/report.xml'
            'feature/training/build/reports/coverage/test/internal/debug/report.xml'
            'feature/profile/build/reports/coverage/test/internal/debug/report.xml'
            'feature/today/build/reports/coverage/test/internal/debug/report.xml'
          )
          ./scripts/coverage/verify-coverage.ps1 -ReportPath $reports -BaseRef $baseRef

      - name: Retain actionable coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-coverage-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            app/build/reports/coverage/test/internal/debug/
            core/model/build/reports/jacoco/test/
            core/network/build/reports/coverage/test/internal/debug/
            feature/food/build/reports/coverage/test/internal/debug/
            feature/training/build/reports/coverage/test/internal/debug/
            feature/profile/build/reports/coverage/test/internal/debug/
            feature/today/build/reports/coverage/test/internal/debug/
            core/data/build/reports/coverage/test/internal/debug/
            build/reports/coverage-policy/
            integration/healthconnect/build/reports/coverage/test/internal/debug/
            integration/scanner/build/reports/coverage/test/internal/debug/
          if-no-files-found: error
          retention-days: 30

      - name: Generate aggregate CycloneDX SBOM in an isolated graph
        run: ./gradlew cyclonedxBom --no-daemon --console=plain

      - name: Verify migration artifact identities and legacy certificate
        shell: pwsh
        run: ./scripts/release/verify-data-migration-artifacts.ps1 -SkipBuild

      - name: Verify R8 reports and production size budget
        shell: pwsh
        run: ./scripts/release/verify-r8-artifacts.ps1

      - name: Prepare exact-commit checksums, metadata, and CycloneDX SBOM
        shell: pwsh
        env:
          VERIFIED_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          ./scripts/supply-chain/write-verified-build-metadata.ps1 -CommitSha $env:VERIFIED_COMMIT
          ./scripts/supply-chain/verify-verified-build-metadata.ps1 -CommitSha $env:VERIFIED_COMMIT

      - name: Retain verified release inputs and SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-verified-release-inputs-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/verified-artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Retain internal verification APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-internal-debug-apk
          path: app/build/outputs/apk/internal/debug/app-internal-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Retain production R8 reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-production-r8-reports
          path: |
            app/build/outputs/mapping/productionRelease/mapping.txt
            app/build/outputs/r8Reports/productionRelease/usage.txt
            app/build/outputs/r8Reports/productionRelease/seeds.txt
            app/build/outputs/r8Reports/productionRelease/configuration.txt
            app/build/outputs/mapping/legacyMigrationRelease/mapping.txt
            app/build/outputs/r8Reports/legacyMigrationRelease/usage.txt
            app/build/outputs/r8Reports/legacyMigrationRelease/seeds.txt
            app/build/outputs/r8Reports/legacyMigrationRelease/configuration.txt
          if-no-files-found: error
          retention-days: 30

      - name: Retain configuration-cache diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-configuration-cache-diagnostics
          path: |
            build/reports/configuration-cache/
            build/reports/problems/
          if-no-files-found: warn
          retention-days: 14

  provenance:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout verification scripts from exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download exact verified artifact set
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: musfit-verified-release-inputs-${{ github.sha }}
          path: verified-artifacts

      - name: Reverify checksums and commit binding
        shell: pwsh
        run: ./scripts/supply-chain/verify-verified-build-metadata.ps1 -CommitSha $env:GITHUB_SHA -ArtifactDirectory verified-artifacts

      - name: Publish signed SLSA build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: verified-artifacts/SHA256SUMS

      - name: Publish signed CycloneDX SBOM attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: verified-artifacts/SHA256SUMS
          sbom-path: verified-artifacts/musfit.cdx.json

      - name: Retain PR build, unit, lint, and release reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: musfit-pr-build-test-reports-${{ github.run_attempt }}
          path: |
            app/build/reports/tests/
            app/build/test-results/
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
            app/build/outputs/apk/production/release/output-metadata.json
            app/build/outputs/bundle/productionRelease/output-metadata.json
          if-no-files-found: warn
          retention-days: 14
