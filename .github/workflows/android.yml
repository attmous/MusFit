name: Android

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the app's versionCode (git commit count) is real.
          # A shallow checkout would collapse it to 1 and break OTA updates.
          fetch-depth: 0

      - name: Verify repository workflow contract
        shell: pwsh
        run: ./scripts/dev/test-dev-workflow.ps1 -SelfTest

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle build and configuration cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Only master runs write cache entries; PR/branch runs read them.
          # Branches can read the default-branch cache, so same-commit re-runs
          # and non-source PRs reuse master's task outputs while the repo stays
          # under GitHub's 10 GB Actions cache cap.
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify internal, migration bridge, and production-shaped builds
        run: ./gradlew verifyReleaseVariantMatrix testInternalDebugUnitTest testLegacyMigrationReleaseUnitTest testProductionReleaseUnitTest lintInternalDebug lintLegacyMigrationRelease lintProductionRelease assembleInternalDebug assembleInternalDebugAndroidTest assembleLegacyMigrationRelease assembleProductionRelease bundleProductionRelease --no-daemon --console=plain

      - name: Verify migration artifact identities and legacy certificate
        shell: pwsh
        run: ./scripts/release/verify-data-migration-artifacts.ps1 -SkipBuild

      - name: Verify R8 reports and production size budget
        shell: pwsh
        run: ./scripts/release/verify-r8-artifacts.ps1

      - name: Retain internal verification APK
        uses: actions/upload-artifact@v4
        with:
          name: musfit-internal-debug-apk
          path: app/build/outputs/apk/internal/debug/app-internal-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Retain production R8 reports
        uses: actions/upload-artifact@v4
        with:
          name: musfit-production-r8-reports
          path: |
            app/build/outputs/mapping/productionRelease/mapping.txt
            app/build/outputs/r8Reports/productionRelease/usage.txt
            app/build/outputs/r8Reports/productionRelease/seeds.txt
            app/build/outputs/r8Reports/productionRelease/configuration.txt
            app/build/outputs/mapping/legacyMigrationRelease/mapping.txt
            app/build/outputs/r8Reports/legacyMigrationRelease/usage.txt
            app/build/outputs/r8Reports/legacyMigrationRelease/seeds.txt
            app/build/outputs/r8Reports/legacyMigrationRelease/configuration.txt
          if-no-files-found: error
          retention-days: 30

  critical-journeys:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Enable KVM for managed devices
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Provision managed-device system images
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "system-images;android-28;default;x86_64"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run API 28 and API 37 critical journeys
        run: ./gradlew criticalJourneysApi28And37GroupInternalDebugAndroidTest '-Pandroid.testInstrumentationRunnerArguments.class=com.musfit.ui.MusFitCriticalJourneyInstrumentationTest' --no-daemon --console=plain

      - name: Retain managed-device results and failure diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: musfit-critical-journeys
          path: |
            app/build/reports/androidTests/managedDevice/
            app/build/outputs/androidTest-results/managedDevice/
            app/build/outputs/managed_device_android_test_additional_output/
          if-no-files-found: warn
          retention-days: 14
